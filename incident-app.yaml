apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: incident-app
  template:
    metadata:
      labels:
        app: incident-app
    spec:
      containers:
      - name: flask-app
        image: anishawalgaonkar/incidents-app:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: incident-service
spec:
  type: NodePort
  selector:
    app: incident-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30000
