{% extends 'layout.html' %}

{% block body %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="/" class="text-sm text-gray-500 hover:text-blue-600 mb-2 inline-block">&larr; Back to Dashboard</a>
        <h2 class="text-2xl font-bold text-gray-800">Declare New Incident</h2>
        <p class="text-gray-500">Please provide accurate details for the response team.</p>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <form method="POST">
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Service Name</label>
                <input type="text" name="service" required
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                       placeholder="e.g. Payment Gateway, Login API">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Severity Level</label>
                <div class="grid grid-cols-3 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="severity" value="SEV1" class="peer sr-only" required>
                        <div class="p-4 rounded-lg border border-gray-200 text-center peer-checked:bg-red-50 peer-checked:border-red-500 peer-checked:text-red-700 hover:bg-gray-50 transition-all">
                            <span class="block font-bold">SEV1</span>
                            <span class="text-xs">Critical</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="severity" value="SEV2" class="peer sr-only">
                        <div class="p-4 rounded-lg border border-gray-200 text-center peer-checked:bg-orange-50 peer-checked:border-orange-500 peer-checked:text-orange-700 hover:bg-gray-50 transition-all">
                            <span class="block font-bold">SEV2</span>
                            <span class="text-xs">High</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="severity" value="SEV3" class="peer sr-only">
                        <div class="p-4 rounded-lg border border-gray-200 text-center peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 hover:bg-gray-50 transition-all">
                            <span class="block font-bold">SEV3</span>
                            <span class="text-xs">Low</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Incident Description</label>
                <textarea name="description" rows="4" required
                          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                          placeholder="Describe what is broken..."></textarea>
            </div>

            <div class="flex items-center justify-end gap-4">
                <a href="/" class="text-gray-500 hover:text-gray-700 font-medium">Cancel</a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-bold shadow-md hover:shadow-lg transition-all">
                    Create Incident
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
