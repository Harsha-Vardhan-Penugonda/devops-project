    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Command</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-20 hidden md:flex">
            <div class="h-16 flex items-center justify-center border-b border-slate-800">
                <h1 class="text-xl font-bold tracking-wider text-blue-400">
                    <i class="fa-solid fa-shield-halved mr-2"></i>Room 3
                </h1>
            </div>
            
            <nav class="flex-1 px-2 py-6 space-y-2">
                <a href="/" class="flex items-center px-4 py-3 text-gray-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-chart-line w-6"></i> Dashboard
                </a>
                <a href="/incidents" class="flex items-center px-4 py-3 text-gray-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-list w-6"></i> All Incidents
                </a>
                <a href="/create" class="flex items-center px-4 py-3 text-gray-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-plus-circle w-6"></i> Create New
                </a>
                <a href="/export" class="flex items-center px-4 py-3 text-gray-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors mt-8">
                    <i class="fa-solid fa-download w-6"></i> Export CSV
                </a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden relative">
            
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 md:hidden z-10">
                <span class="font-bold text-lg">NOC OPS</span>
                <button class="text-gray-600"><i class="fa-solid fa-bars"></i></button>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6">
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        <div class="mb-6 space-y-2">
                            {% for category, message in messages %}
                            <div class="p-4 rounded-lg shadow-sm border-l-4 
                                {% if category == 'success' %} bg-green-50 border-green-500 text-green-700
                                {% else %} bg-blue-50 border-blue-500 text-blue-700 {% endif %}">
                                <p class="font-medium">{{ message }}</p>
                            </div>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}

                {% block body %}{% endblock %}
            </main>
        </div>
    </div>

</body>
</html>
